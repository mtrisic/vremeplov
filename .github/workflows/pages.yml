# Build the web emulator and publish the site to GitHub Pages:
#   /            README rendered as the landing page
#   /galaksija/  the emulator (canvas + WASM)
#
# Build artifacts (vremeplov.wasm, wasm_exec.js) are never committed —
# wasm_exec.js must come from the exact Go version that compiled the
# wasm — so Pages gets them from a fresh build on every push to main.
#
# No manual setup needed: configure-pages runs with enablement:true, so
# it creates the Pages site (source: GitHub Actions) on first run.

name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.work.sum

      - name: Build the web emulator
        run: bash tools/build-wasm.sh

      - name: Assemble site (README homepage, emulator under /galaksija/)
        run: bash tools/build-site.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
